# Railway 배포용 Nixpacks 설정 (FastAPI + Ecount 크롤러)
# 참고: Next.js 프론트엔드는 Vercel 담당, 이 설정은 Railway 백엔드 service용.
#
# 루트에 package.json이 있어도 Railway가 이 파일을 감지하면 Python 빌드로 전환.
# railway.json의 startCommand가 최종 진입점.

[phases.setup]
# Python 3.11 + Playwright 시스템 의존성에 필요한 최소 도구
nixPkgs = ["python311", "gcc", "postgresql"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r services/api/requirements.txt",
  "python -m playwright install --with-deps chromium",
]

[start]
cmd = "uvicorn services.api.main:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHONUNBUFFERED = "1"
