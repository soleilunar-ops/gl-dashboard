name: Auto Generate Types

on:
  workflow_dispatch:
  # push submain 트리거 준비 — 필요 시 아래 주석 해제
  # push:
  #   branches: [submain]

permissions:
  contents: write

jobs:
  generate-types:
    name: Generate Supabase Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: submain

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Supabase CLI 설치
        run: npm install -g supabase

      - name: 타입 생성
        run: supabase gen types typescript --project-id ${{ secrets.SUPABASE_PROJECT_ID }} > supabase/types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 변경 확인 및 커밋
        run: |
          if git diff --quiet supabase/types.ts; then
            echo "✅ 타입 변경 없음 — 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add supabase/types.ts
            git commit -m "[Bot] chore: supabase types 자동 갱신"
            git push origin submain
            echo "✅ supabase/types.ts 갱신 완료"
          fi
