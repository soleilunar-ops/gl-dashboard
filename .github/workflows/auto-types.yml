name: Auto Generate Types

on:
  workflow_dispatch:
  # push submain 트리거 준비 — 필요 시 아래 주석 해제
  # push:
  #   branches: [submain]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-types:
    name: Generate Supabase Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: submain

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Supabase CLI 설치
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 타입 생성
        run: supabase gen types typescript --project-id ${{ secrets.SUPABASE_PROJECT_ID }} > supabase/types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 변경 PR 생성 (변경 있을 시에만)
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "[Bot] chore: supabase types 자동 갱신"
          title: "[Bot] chore: supabase types 자동 갱신"
          body: |
            Supabase 스키마 변경을 반영한 `supabase/types.ts` 자동 재생성입니다.

            - 트리거: `workflow_dispatch` 수동 (또는 submain push 활성화 시)
            - 변경 없으면 이 PR은 생성되지 않습니다.
            - 머지 대상: `submain`
          branch: bot/supabase-types-update
          delete-branch: true
          base: submain
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          sign-commits: false
